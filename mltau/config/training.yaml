training:
  debug_run: False
  lr: 0.0001
  model:
    name: MultiParTau  # MultiParTau | SingleParTau
    task: is_tau       # SingleParTau only: is_tau | charge | decay_mode | kinematics
  trainer:
    max_epochs: 250
    
  dataloader:
    batch_size: 2048
    num_dataloader_workers: 4
    prefetch_factor: 8  # Reduced from 100: safer with IterableDataset + awkward arrays